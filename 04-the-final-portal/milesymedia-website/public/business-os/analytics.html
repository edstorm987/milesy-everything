<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Business OS — Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="../incubator/print.css" media="print" />
</head>
<body class="bos-body" data-mobile-checked="2026-05-07">

  <div class="bos-bg-glow" aria-hidden="true"></div>

  <div class="bos-shell">
    <aside class="bos-sidebar">
      <a href="app.html" class="brand bos-brand-niche">
        <span class="mark" data-bos-niche-icon>◆</span>
        <span class="brand-name" data-bos-niche-label>Business OS</span>
      </a>
      <nav class="bos-side-nav" data-bos-auto-nav data-bos-active="analytics.html"></nav>
    </aside>

    <main class="bos-main bos-analytics">

      <header class="bos-section-head">
        <div>
          <span class="eyebrow">Analytics</span>
          <h1>Your portal, in numbers.</h1>
          <p class="muted">Per-business analytics aggregated from localStorage. Honesty contract: small-n badges when fewer than 7 events or 7 days of data.</p>
        </div>
        <div class="bos-an-period">
          <button type="button" class="bos-chip" data-an-period="7">7d</button>
          <button type="button" class="bos-chip is-on" data-an-period="30">30d</button>
          <button type="button" class="bos-chip" data-an-period="all">All time</button>
        </div>
      </header>

      <div class="bos-an-grid" data-bos-an-grid>
        <div class="bos-an-tile">Loading…</div>
      </div>

    </main>
  </div>

  <script src="../incubator/lib/storage.js"></script>
  <script src="../incubator/lib/notify.js"></script>
  <script src="../incubator/lib/activity.js"></script>
  <script src="bos.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    var state = { periodDays: 30 };
    function getJ(k, d) { try { return JSON.parse(localStorage.getItem(k) || JSON.stringify(d)); } catch (e) { return d; } }
    function periodMs() { return state.periodDays === 'all' ? null : state.periodDays * 86400000; }

    /* Helpers ---------------- */
    function smallN(n, threshold) {
      threshold = threshold || 7;
      return n < threshold ? '<span class="bos-an-pill bos-an-pill-warn" title="Small sample — indicative only">n<' + threshold + ' indicative</span>' : '';
    }

    function tileLessons() {
      var prog = getJ('bos.lessonProgress', {}) || {};
      var done = Object.keys(prog).filter(function (k) { return prog[k]; }).length;
      var total = 22; // current registry
      var pct = total ? Math.round((done / total) * 100) : 0;
      return '<div class="bos-an-tile"><div class="bos-an-lbl">📚 Lessons completed</div>' +
        '<div class="bos-an-num">' + done + ' / ' + total + '</div>' +
        '<div class="bos-an-bar"><span style="width:' + pct + '%"></span></div>' +
        '<div class="muted bos-an-sub">' + pct + '% of the library · ' + smallN(done) + '</div></div>';
    }

    function tilePhases() {
      var phases = ['epic-intro','blueprint','diagnostics','brand-builder'];
      var labels = { 'epic-intro':'Epic Intro','blueprint':'Blueprint','diagnostics':'Diagnostics','brand-builder':'Brand Builder' };
      var current = (window.BOSStorage ? localStorage.getItem('incubator.phase') : null) || 'epic-intro';
      var advanced = getJ('incubator.phaseAdvanced', {}) || {};
      var dots = phases.map(function (p) {
        var cls = 'bos-an-dot';
        if (advanced[p]) cls += ' is-done';
        else if (p === current) cls += ' is-current';
        else {
          var ci = phases.indexOf(current); var pi = phases.indexOf(p);
          if (pi > ci) cls += ' is-future';
        }
        return '<div class="' + cls + '"><span></span><div>' + labels[p] + '</div></div>';
      }).join('');
      var done = Object.keys(advanced).filter(function (k) { return advanced[k]; }).length;
      return '<div class="bos-an-tile"><div class="bos-an-lbl">🏛 Phase progress</div>' +
        '<div class="bos-an-phases">' + dots + '</div>' +
        '<div class="muted bos-an-sub">Advanced: ' + done + ' of 4 · current: ' + (labels[current] || current) + '</div></div>';
    }

    function tileHc() {
      var hc = getJ('bos.healthCheck', null);
      if (!hc || !Array.isArray(hc.topics) || !hc.topics.length) {
        return '<div class="bos-an-tile"><div class="bos-an-lbl">🩺 Health Check</div>' +
          '<div class="bos-an-num bos-an-num--muted">—</div>' +
          '<div class="muted bos-an-sub">No HC on file. <a href="../health-check/index.html">Run the 12-min HC →</a></div></div>';
      }
      var answered = hc.topics.filter(function (t) { return typeof t.score === 'number'; });
      var avg = answered.length ? Math.round(answered.reduce(function (s, t) { return s + t.score; }, 0) / answered.length) : null;
      var weakest = answered.slice().sort(function (a, b) { return a.score - b.score; })[0];
      return '<div class="bos-an-tile"><div class="bos-an-lbl">🩺 Health Check trend</div>' +
        '<div class="bos-an-num">' + (avg != null ? avg + '/100' : '—') + '</div>' +
        '<div class="muted bos-an-sub">Latest snapshot · ' + answered.length + ' / ' + hc.topics.length + ' topics answered · ' +
        'weakest: <strong>' + (weakest ? weakest.name : '—') + '</strong> ' + smallN(answered.length, 5) + '</div>' +
        '<div class="muted bos-an-sub" style="margin-top:6px"><em>Single snapshot — re-run HC to track delta over time.</em></div></div>';
    }

    function tileActivity() {
      var since = periodMs();
      var rows = (window.Activity && window.Activity.list({ sinceMs: since })) || [];
      var byKind = {};
      rows.forEach(function (e) { byKind[e.kind] = (byKind[e.kind] || 0) + 1; });
      var top = Object.keys(byKind).map(function (k) { return [k, byKind[k]]; })
        .sort(function (a, b) { return b[1] - a[1]; }).slice(0, 3);
      var topHtml = top.length
        ? '<ul class="bos-an-list">' + top.map(function (p) {
            var meta = window.Activity.metaFor(p[0]);
            return '<li><span>' + meta.icon + '</span> ' + meta.label + ' <strong>' + p[1] + '</strong></li>';
          }).join('') + '</ul>'
        : '<div class="muted bos-an-sub">No activity in this period.</div>';
      var lbl = state.periodDays === 'all' ? 'all time' : state.periodDays + 'd';
      return '<div class="bos-an-tile"><div class="bos-an-lbl">📊 Activity events · ' + lbl + '</div>' +
        '<div class="bos-an-num">' + rows.length + '</div>' +
        '<div class="muted bos-an-sub">' + smallN(rows.length) + '</div>' +
        topHtml + '</div>';
    }

    function tileNotifications() {
      var notifs = getJ('bos.notifications', []);
      var since = periodMs();
      var inPeriod = since == null ? notifs : notifs.filter(function (n) { return Date.now() - +new Date(n.ts) <= since; });
      var read = inPeriod.filter(function (n) { return n.read; }).length;
      var total = inPeriod.length;
      var rate = total ? Math.round((read / total) * 100) : 0;
      var lbl = state.periodDays === 'all' ? 'all time' : state.periodDays + 'd';
      return '<div class="bos-an-tile"><div class="bos-an-lbl">🔔 Notifications · ' + lbl + '</div>' +
        '<div class="bos-an-num">' + (total ? rate + '%' : '—') + '</div>' +
        '<div class="bos-an-bar"><span style="width:' + rate + '%"></span></div>' +
        '<div class="muted bos-an-sub">' + read + ' / ' + total + ' read · ' + smallN(total) + '</div></div>';
    }

    function paint() {
      var html = [tileLessons(), tilePhases(), tileHc(), tileActivity(), tileNotifications()].join('');
      document.querySelector('[data-bos-an-grid]').innerHTML = html;
    }
    paint();

    document.addEventListener('click', function (ev) {
      var p = ev.target.closest('[data-an-period]');
      if (!p) return;
      var v = p.getAttribute('data-an-period');
      state.periodDays = v === 'all' ? 'all' : parseInt(v, 10);
      document.querySelectorAll('[data-an-period]').forEach(function (b) { b.classList.toggle('is-on', b === p); });
      paint();
    });

    document.addEventListener('activity:logged', paint);
    document.addEventListener('notify:new', paint);
    document.addEventListener('notify:read', paint);
  });
  </script>

</body>
</html>
