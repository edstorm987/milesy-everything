<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Business OS — Activity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/business-os/styles.css" />
</head>
<body class="bos-body">

  <div class="bos-bg-glow" aria-hidden="true"></div>

  <div class="bos-shell">
    <aside class="bos-sidebar">
      <a href="app.html" class="brand bos-brand-niche">
        <span class="mark" data-bos-niche-icon>◆</span>
        <span class="brand-name" data-bos-niche-label>Business OS</span>
      </a>
      <nav class="bos-side-nav" data-bos-auto-nav data-bos-active="activity.html"></nav>
    </aside>

    <main class="bos-main bos-activity">
      <header class="bos-section-head">
        <div>
          <span class="eyebrow">Activity</span>
          <h1>Everything that happened, in order.</h1>
          <p class="muted">A unified timeline of HC submissions, phase advances, lessons completed, marketplace clicks, and feedback. Capped at the last 200 entries.</p>
        </div>
        <div>
          <button type="button" class="btn btn-secondary" data-bos-activity-clear>🗑 Clear log</button>
        </div>
      </header>

      <div class="bos-activity-filters">
        <div class="bos-activity-filter-group">
          <span class="muted">Kind:</span>
          <button type="button" class="bos-chip is-on" data-filter-kind="">All</button>
          <button type="button" class="bos-chip" data-filter-kind="hc">HC</button>
          <button type="button" class="bos-chip" data-filter-kind="incubator">Incubator</button>
          <button type="button" class="bos-chip" data-filter-kind="lesson">Lessons</button>
          <button type="button" class="bos-chip" data-filter-kind="marketplace">Marketplace</button>
          <button type="button" class="bos-chip" data-filter-kind="pro">Pro</button>
        </div>
        <div class="bos-activity-filter-group">
          <span class="muted">Range:</span>
          <button type="button" class="bos-chip is-on" data-filter-range="">All time</button>
          <button type="button" class="bos-chip" data-filter-range="7">7 days</button>
          <button type="button" class="bos-chip" data-filter-range="30">30 days</button>
        </div>
      </div>

      <ul class="bos-activity-list" data-bos-activity-list></ul>
    </main>
  </div>

  <script defer src="/incubator/lib/storage.js"></script>
  <script defer src="/incubator/lib/activity.js"></script>
  <script defer src="/business-os/bos.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var state = { kind: '', rangeDays: '' };
      function escape(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }
      function payloadSummary(p) {
        if (!p || typeof p !== 'object') return '';
        var bits = [];
        if (p.lessonId) bits.push(escape(p.lessonId));
        if (p.title) bits.push(escape(p.title));
        if (p.from && p.to) bits.push(escape(p.from) + ' → ' + escape(p.to));
        if (p.addonId) bits.push(escape(p.addonId));
        if (p.leakEstimate != null) bits.push('£' + p.leakEstimate.toLocaleString() + ' leak est.');
        if (p.topicsAnswered != null) bits.push(p.topicsAnswered + ' topics');
        if (p.business) bits.push('biz: ' + escape(p.business));
        if (p.name) bits.push(escape(p.name));
        return bits.length ? '<span class="bos-activity-payload">' + bits.join(' · ') + '</span>' : '';
      }
      function paint() {
        var filter = {};
        if (state.kind) filter.kind = state.kind;
        if (state.rangeDays) filter.sinceMs = parseInt(state.rangeDays, 10) * 86400000;
        var list = window.Activity.list(filter);
        var host = document.querySelector('[data-bos-activity-list]');
        if (!list.length) {
          host.innerHTML = '<li class="bos-activity-empty">Nothing logged yet.' + (state.kind || state.rangeDays ? ' Try widening the filter.' : '') + '</li>';
          return;
        }
        host.innerHTML = list.map(function (e) {
          var meta = window.Activity.metaFor(e.kind);
          return '<li class="bos-activity-row">' +
            '<span class="bos-activity-icon">' + escape(meta.icon) + '</span>' +
            '<div class="bos-activity-body">' +
              '<div class="bos-activity-line"><strong>' + escape(meta.label) + '</strong> ' + payloadSummary(e.payload) + '</div>' +
              '<div class="bos-activity-meta muted">' + new Date(e.ts).toLocaleString() + ' · <code>' + escape(e.kind) + '</code></div>' +
            '</div>' +
          '</li>';
        }).join('');
      }
      paint();

      document.addEventListener('click', function (ev) {
        var k = ev.target.closest('[data-filter-kind]');
        if (k) {
          state.kind = k.getAttribute('data-filter-kind');
          document.querySelectorAll('[data-filter-kind]').forEach(function (b) { b.classList.toggle('is-on', b === k); });
          paint();
          return;
        }
        var r = ev.target.closest('[data-filter-range]');
        if (r) {
          state.rangeDays = r.getAttribute('data-filter-range');
          document.querySelectorAll('[data-filter-range]').forEach(function (b) { b.classList.toggle('is-on', b === r); });
          paint();
          return;
        }
        var c = ev.target.closest('[data-bos-activity-clear]');
        if (c) {
          if (!confirm('Clear the entire activity log? This cannot be undone.')) return;
          window.Activity.clear();
          paint();
        }
      });

      document.addEventListener('activity:logged', paint);
    });
  </script>

</body>
</html>
