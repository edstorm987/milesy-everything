name: CI

# Post-unification CI (T6 R002, chapter #165). One Next.js host at
# `04-the-final-portal/milesymedia-website/` + plugin matrix discovered
# dynamically from `04-the-final-portal/plugins/*/package.json` (only
# those declaring an `npm run smoke` script).
#
# Replaces the legacy ci.yml that targeted the now-removed
# `04-the-final-portal/portal/` (chapter #122 unification).

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tsc-and-smoke-portal:
    name: tsc + smoke (milesymedia-website)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: 04-the-final-portal/milesymedia-website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 04-the-final-portal/milesymedia-website/package-lock.json

      - name: Install (legacy peer deps for workspace file:../plugins/*)
        run: npm install --legacy-peer-deps --cache /tmp/npm-cache

      - name: tsc --noEmit
        run: npx tsc --noEmit

      - name: npm run smoke
        run: npm run smoke

  discover-plugins:
    name: discover plugin matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      plugins: ${{ steps.list.outputs.plugins }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: List plugin dirs (with smoke script)
        id: list
        run: |
          # Find every plugins/*/package.json that defines a "smoke" script.
          mapfile -t dirs < <(git ls-files '04-the-final-portal/plugins/*/package.json' | xargs -I{} dirname {})
          json='['
          first=1
          for d in "${dirs[@]}"; do
            if node -e "const p=require('./'+process.argv[1]+'/package.json'); process.exit(p.scripts&&p.scripts.smoke?0:1)" "$d" 2>/dev/null; then
              if [ $first -eq 0 ]; then json+=','; fi
              json+="\"$d\""
              first=0
            fi
          done
          json+=']'
          echo "plugins=$json" >> "$GITHUB_OUTPUT"
          echo "Discovered: $json"

  tsc-and-smoke-plugins:
    name: tsc + smoke (${{ matrix.plugin }})
    needs: discover-plugins
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ needs.discover-plugins.outputs.plugins != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.discover-plugins.outputs.plugins) }}
    defaults:
      run:
        working-directory: ${{ matrix.plugin }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install --cache /tmp/npm-cache

      - name: tsc --noEmit
        run: npx tsc --noEmit

      - name: npm run smoke
        run: npm run smoke

  ci-summary:
    name: CI summary
    needs: [tsc-and-smoke-portal, tsc-and-smoke-plugins]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Summary
        run: |
          echo "portal: ${{ needs.tsc-and-smoke-portal.result }}"
          echo "plugins: ${{ needs.tsc-and-smoke-plugins.result }}"
          if [ "${{ needs.tsc-and-smoke-portal.result }}" != "success" ] || \
             { [ "${{ needs.tsc-and-smoke-plugins.result }}" != "success" ] && \
               [ "${{ needs.tsc-and-smoke-plugins.result }}" != "skipped" ]; }; then
            echo "CI failed"
            exit 1
          fi
          echo "CI green"
