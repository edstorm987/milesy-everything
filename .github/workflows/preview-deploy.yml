name: Preview deploy

# Vercel preview deploys the shared portal on every PR open/update and
# comments the preview URL back on the PR. Requires repo secrets:
#   VERCEL_TOKEN        — operator account token
#   VERCEL_ORG_ID       — Vercel team / org id
#   VERCEL_PROJECT_ID   — shared-portal project id
# These are NOT required for CI to pass; if any secret is missing the
# job is skipped (Ed deploys manually per runbook §3 — CI is for
# pre-merge confidence, not auto-deploy).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Vercel preview
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip if Vercel secrets unset
        id: gate
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel preview-deploy skipped — set VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID repo secrets to enable."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          node-version: "20"

      - name: Install Vercel CLI
        if: steps.gate.outputs.skip != 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel env (preview)
        if: steps.gate.outputs.skip != 'true'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build preview
        if: steps.gate.outputs.skip != 'true'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy preview
        if: steps.gate.outputs.skip != 'true'
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on PR
        if: steps.gate.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const url = `${{ steps.deploy.outputs.url }}`;
            const body = `🔎 **Vercel preview**: ${url}\n\n_Deployed from \`${context.sha.slice(0,7)}\`._`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const mine = comments.find(c => c.user.type === "Bot" && c.body && c.body.startsWith("🔎 **Vercel preview**"));
            if (mine) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: mine.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
